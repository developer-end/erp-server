server:
  port: 8081
  servlet:
    context-path: /erp

spring:
  application:
    name: SchoolAdministrationServer

  profiles:
    active: local

  main:
    banner-mode: off

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        multiTenancy: SCHEMA
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false
  #    locations: classpath:db/migration/master
  #    schemas: master
  #    create-schema: true
  #    baseline-on-migrate: true
  #    baseline-version: 1

  datasource:
    hikari:
      pool-name: school-erp-hikari-pool
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 60000
      max-lifetime: 1700000

  logging:
    level:
      root: INFO
      org.hibernate.SQL: INFO
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE

security:
  jwt:
    secret: F_n,cPUG(.OYmru-c4mxG4^s)*5$yoKy6gxJ9#t]#=OlkJ%u&R8(Kx_]fwD
    access-token-expire-days: 15
    refresh-token-expire-months: 2
